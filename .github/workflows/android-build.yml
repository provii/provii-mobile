name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  # =============================================================================
  # Debug Build
  # =============================================================================
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.inputs.build_type != 'release'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Run Unit Tests
        run: |
          cd android
          ./gradlew testDebugUnitTest --stacktrace

      - name: Generate Test Report
        if: always()
        run: |
          cd android
          ./gradlew testDebugUnitTestReport --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: android-test-results-${{ github.sha }}
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 14

  # =============================================================================
  # Release Build
  # =============================================================================
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Download provii-mobile-sdk bundle
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
        with:
          repository: provii/provii-mobile-sdk
          tag: 'v0.1.0'
          fileName: 'provii-mobile-sdk-bundle.tar.gz'
          out-file-path: provii-mobile-sdk-artifacts
          token: ${{ github.token }}

      - name: Extract provii-mobile-sdk
        run: |
          mkdir -p android/app/libs
          tar -xzf provii-mobile-sdk-artifacts/provii-mobile-sdk-bundle.tar.gz
          cp -r release-artifacts/android/* android/app/libs/
          cp -r release-artifacts/bindings/kotlin/* android/app/src/main/java/
          echo "provii-mobile-sdk Android artifacts extracted"

      - name: Compute native library integrity hashes
        id: lib_hashes
        run: |
          set -euo pipefail
          HASH_PAIRS=""
          for so_file in android/app/src/main/jniLibs/*/libprovii_mobile_sdk_ffi.so android/app/libs/jniLibs/*/libprovii_mobile_sdk_ffi.so; do
            [ -f "$so_file" ] || continue
            ABI=$(basename "$(dirname "$so_file")")
            HASH=$(sha256sum "$so_file" | awk '{print $1}')
            if [ -n "$HASH_PAIRS" ]; then
              HASH_PAIRS="${HASH_PAIRS};${ABI}=${HASH}"
            else
              HASH_PAIRS="${ABI}=${HASH}"
            fi
            echo "  ${ABI}: ${HASH}"
          done
          if [ -z "$HASH_PAIRS" ]; then
            echo "::error::No libprovii_mobile_sdk_ffi.so files found for hash computation"
            exit 1
          fi
          echo "NATIVE_LIB_HASHES=${HASH_PAIRS}" >> "$GITHUB_ENV"
          echo "## Native Library Integrity Hashes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$HASH_PAIRS" | tr ';' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1.0.4
        if: github.event_name != 'pull_request'
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Build Release AAB (App Bundle)
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      - name: Sign Release AAB
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1.0.4
        if: github.event_name != 'pull_request'
        id: sign_bundle
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Generate Checksums
        run: |
          cd android/app/build/outputs
          find . -name "*.apk" -exec sha256sum {} \; > checksums-apk.txt
          find . -name "*.aab" -exec sha256sum {} \; > checksums-aab.txt
          cat checksums-apk.txt checksums-aab.txt > checksums.txt

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-apk-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 30

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-aab-${{ github.sha }}
          path: |
            android/app/build/outputs/bundle/release/*.aab
            ${{ steps.sign_bundle.outputs.signedReleaseFile }}
          retention-days: 30

      - name: Upload Checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-checksums-${{ github.sha }}
          path: android/app/build/outputs/checksums.txt
          retention-days: 90
