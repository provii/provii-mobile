opt_in_rules:
  - fatal_error_message
  - force_unwrapping
  - implicitly_unwrapped_optional

disabled_rules:
  - for_where
  - identifier_name
  - type_name

excluded:
  - Pods
  - build

force_try:
  severity: error

force_cast:
  severity: error

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: warning

line_length:
  warning: 300
  error: 500

file_length:
  warning: 2000
  error: 6000

type_body_length:
  warning: 1000
  error: 3000

function_body_length:
  warning: 200
  error: 500
