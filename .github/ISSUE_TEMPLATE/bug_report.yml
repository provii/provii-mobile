name: Bug Report
description: Report a bug in the Provii wallet mobile app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug. Please fill out the fields below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps needed to trigger this bug.
      placeholder: |
        1. Open the app
        2. Navigate to '...'
        3. Tap on '...'
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model
      description: e.g. iPhone 16 Pro, Pixel 9, Samsung Galaxy S25
      placeholder: iPhone 16 Pro
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: e.g. iOS 18.1, Android 15
      placeholder: iOS 18.1
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: Found in Settings within the app
      placeholder: "1.0.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Attach any relevant screenshots, screen recordings, or crash logs.
      render: shell
    validations:
      required: false
