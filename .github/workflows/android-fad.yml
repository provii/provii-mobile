# Android Firebase App Distribution pipeline.
#
# Triggers:
#   - push of any tag matching v*  (production releases)
#   - workflow_dispatch              (manual FAD rebuilds)
#
# Single-bundle architecture: the FAD upload always carries package id
# `app.provii.wallet`. Sandbox vs production is a runtime toggle inside
# the app, not a separate package.
#
# Required secrets:
#   FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON  base64-encoded service-account JSON
#   FIREBASE_APP_ID                              Firebase application id
#   ANDROID_SIGNING_KEY                          base64-encoded release .jks
#   ANDROID_KEY_ALIAS                            release key alias
#   ANDROID_KEYSTORE_PASSWORD                    release keystore password
#   ANDROID_KEY_PASSWORD                         release key password
#   SLACK_WEBHOOK_URL                            optional Slack notification URL

name: Android FAD

on:
  # Firebase App Distribution publishing is deliberate (needs signing + FAD
  # service-account secrets): dispatch-only, not auto-fired on tags.
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: android-fad-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  fad:
    name: Upload to Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # tag history needed for release-notes generation
          persist-credentials: false

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Decode release keystore
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_SIGNING_KEY:-}" ]; then
            echo "::error::ANDROID_SIGNING_KEY secret not set"
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/keystore"
          echo -n "${ANDROID_SIGNING_KEY}" | base64 --decode > "${RUNNER_TEMP}/keystore/release.jks"
          echo "RELEASE_KEYSTORE_PATH=${RUNNER_TEMP}/keystore/release.jks" >> "${GITHUB_ENV}"

      - name: Decode Firebase service-account credentials
        env:
          FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON:-}" ]; then
            echo "::error::FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON secret not set"
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/firebase"
          echo -n "${FIREBASE_APP_DISTRIBUTION_CREDENTIALS_JSON}" | base64 --decode > "${RUNNER_TEMP}/firebase/credentials.json"
          echo "FIREBASE_APP_DISTRIBUTION_CREDENTIALS_PATH=${RUNNER_TEMP}/firebase/credentials.json" >> "${GITHUB_ENV}"

      - name: Run beta lane
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
        working-directory: android
        run: |
          set -euo pipefail
          bundle exec fastlane beta

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload release notes
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-fad-release-notes-${{ github.sha }}
          path: android/fastlane/release_notes.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Wipe decoded credentials
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/firebase/credentials.json" || true
          rm -f "${RUNNER_TEMP}/keystore/release.jks" || true
