version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      gradle-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "bundler"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
  - package-ecosystem: "bundler"
    directory: "/ios"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
